<!DOCTYPE html>
<html lang="es">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mercado Guerrero · App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f7a3f; --green-deep:#0a5a2e; --green-soft:#e8f5ec;
    --orange:#ea580c; --orange-soft:#fff4ec; --orange-deep:#c2410c;
    --ink:#101418; --muted:#6b7280; --line:#e5e7eb;
    --bg:#f8f9fa; --card:#ffffff; --star:#f59e0b;
    --danger:#dc2626;
    --radius:16px;
    --sh: 0 4px 12px rgba(0,0,0,0.05);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  html,body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;height:100%; overflow: hidden;}
  
  /* CONTENEDOR PRINCIPAL REESTRUCTURADO */
  .app-layout { 
    width: 100%; height: 100vh; display: flex; flex-direction: column; 
    position: relative; background: #fff;
  }

  /* VISTA ESCRITORIO (PC/LAPTOP) */
  @media (min-width: 769px) {
    .app-layout { flex-direction: row; background: var(--bg); }
    
    /* Sidebar Fijo a la izquierda */
    #sidebar-desktop {
        display: flex !important; width: 280px; background: #fff;
        border-right: 1px solid var(--line); flex-direction: column; padding: 30px 20px;
        z-index: 100;
    }

    /* Contenido a la derecha */
    .main-content { flex: 1; overflow-y: auto; position: relative; display: flex; flex-direction: column; }
    
    .panel { 
        max-width: 1000px; margin: 0 auto; width: 100%; 
        padding: 40px 20px 100px !important;
        background: transparent !important;
    }

    /* Cuadrículas para los negocios y productos */
    #lista-negocios, #lista-promos, #pub-productos, #biz-productos-lista {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
    }

    .app-header { display: none !important; } /* Ocultar cabecera móvil en PC */
    .app-footer { left: 280px; width: calc(100% - 280px); }
  }

  /* VISTA MÓVIL (Por defecto) */
  #sidebar-desktop { display: none; }
  .main-content { flex: 1; overflow-y: auto; height: 100%; }
  .panel { display: none; padding: 0 0 80px; min-height: 100%; background: #fff; }
  .panel.active { display: flex; flex-direction: column; }

  /* HEADER MÓVIL */
  .app-header { 
    background: var(--green); color: #fff; padding: 16px; 
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; 
  }
  .app-header.orange { background: var(--orange); }

  /* TARJETAS MODERNAS */
  .product-card, .promo-card {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; display: flex; align-items: center; gap: 15px; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--sh);
  }
  .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }

  .product-img { 
    width: 80px; height: 80px; border-radius: 12px; background: #eee; 
    flex-shrink: 0; object-fit: cover;
  }

  /* FOOTER ELEGANTE */
  .app-footer {
    position: absolute; bottom: 0; height: 60px; background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px); border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 12px; font-weight: 600; color: var(--muted); z-index: 200; width: 100%;
  }

  /* BOTONES Y FORMS */
  .btn-save { 
    width: 100%; background: var(--green); color: #fff; border: none; border-radius: 12px;
    padding: 16px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s;
  }
  .btn-save:hover { filter: brightness(1.1); }
  
  .field { margin-bottom: 16px; }
  .field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
  .field input, .field select { width: 100%; border: 1.5px solid var(--line); border-radius: 10px; padding: 12px; font-size: 14px; outline: none; }
  .field input:focus { border-color: var(--green); }

  .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color:#fff; padding:12px 24px; border-radius:50px; z-index:1000; font-weight:600; transition: 0.3s; }
  .toast.hidden { top: -100px; opacity: 0; }
</style>
</head>
<body>

<div class="app-layout">
  <div id="toast" class="toast hidden"></div>

  <aside id="sidebar-desktop">
    <div style="margin-bottom: 40px;">
        <h1 style="font-family:'Bricolage Grotesque'; color:var(--green); font-size:24px;">Mercado Guerrero</h1>
    </div>
    <div style="display:flex; flex-direction:column; gap:10px;">
        <button class="btn-save btn-outline" style="background:transparent; color:var(--ink); text-align:left; border:none;" onclick="navegar('inicio')">🏠 Inicio</button>
        <button class="btn-save btn-outline" style="background:transparent; color:var(--ink); text-align:left; border:none;" onclick="navegar('promos')">🔥 Promociones</button>
        <button class="btn-save btn-outline" style="background:transparent; color:var(--ink); text-align:left; border:none;" onclick="navegar('cuenta')">👤 Mi Cuenta</button>
        <div id="btn-negocio-pc"></div>
    </div>
    <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px;" id="pc-user-info">
        </div>
  </aside>

  <main class="main-content">
    
    <header class="app-header" id="mobile-header">
      <div onclick="toggleMenuMobile()" style="font-size:24px; cursor:pointer;">☰</div>
      <div style="font-family:'Bricolage Grotesque'; font-weight:800; font-size:18px;">MG Guerrero</div>
      <div style="margin-left:auto;" onclick="navegar('cuenta')">
        <img id="nav-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic" style="width:32px; height:32px;">
      </div>
    </header>

    <section id="panel-inicio" class="panel active">
        <div class="app-body">
            <h2 style="font-family:'Bricolage Grotesque'; margin-bottom:15px;">Explora el comercio local</h2>
            <div class="search-box" style="background:#eee; padding:12px; border-radius:12px; margin-bottom:20px;">
                <input type="text" id="buscar" placeholder="¿Qué estás buscando hoy?" oninput="aplicarFiltros()" style="background:transparent; border:none; width:100%; outline:none;">
            </div>
            <div id="lista-negocios">Cargando negocios...</div>
        </div>
    </section>

    <section id="panel-promos" class="panel">
        <div class="app-body">
            <h2 style="font-family:'Bricolage Grotesque'; margin-bottom:15px;">🔥 Ofertas Imperdibles</h2>
            <div id="lista-promos"></div>
        </div>
    </section>

    <section id="panel-cuenta" class="panel">
        <div class="app-body" id="cuenta-contenido"></div>
    </section>

    <section id="panel-editar-perfil" class="panel">
        <div class="app-body" style="max-width:500px; margin: 0 auto;">
            <h2 style="margin-bottom:20px;">Editar mi información</h2>
            <div class="field"><label>Foto de Perfil</label><input type="file" id="edit-user-foto" accept="image/*"></div>
            <div class="field"><label>Nombre Completo *</label><input type="text" id="edit-user-nombre"></div>
            <div class="field"><label>Edad *</label><input type="number" id="edit-user-edad"></div>
            <div class="field"><label>WhatsApp *</label><input type="number" id="edit-user-wa"></div>
            <div class="field"><label>Dirección</label><input type="text" id="edit-user-dir"></div>
            <button class="btn-save" id="btn-save-perfil" onclick="guardarPerfilUsuario()">Guardar Cambios</button>
        </div>
    </section>

    <section id="panel-onb-1" class="panel">
        <div class="app-body" style="max-width:500px; margin: 0 auto;">
            <h2>Registra tu negocio</h2>
            <div class="field"><label>Nombre del negocio</label><input type="text" id="onb-nombre"></div>
            <div class="field"><label>WhatsApp del negocio</label><input type="number" id="onb-wa"></div>
            <div class="field"><label>Dirección física</label><input type="text" id="onb-dir"></div>
            <button class="btn-save" onclick="guardarNegocioRapido()">Dar de alta negocio</button>
        </div>
    </section>

    <footer class="app-footer">
        <svg width="20" height="20" viewBox="0 -22 100 122"><rect x="0" y="0" width="100" height="100" rx="22" fill="#0f7a3f"/><path d="M70 0 L100 0 L100 30 L88 30 A18 18 0 0 0 70 12 Z" fill="#ea580c"/></svg>
        <span>Mercado Guerrero · El corazón de tu comunidad</span>
    </footer>
  </main>

  <div id="panel-auth" class="panel active" style="position:fixed; inset:0; z-index:1000; background:#fff; display:none; align-items:center; justify-content:center;">
    <div style="max-width:350px; width:100%; padding:20px; text-align:center;">
        <h2 style="font-family:'Bricolage Grotesque'; margin-bottom:30px;">Inicia Sesión</h2>
        <div class="field"><label>Email</label><input type="email" id="login-email"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="login-pass"></div>
        <button class="btn-save" onclick="doLogin()">Entrar</button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://djddsqbmaxgpryabvktt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqZGRzcWJtYXhncHJ5YWJ2a3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxMTEsImV4cCI6MjA5MjIxMTExMX0.3JO1RU1_NY4cTCO23_QanF0kFBE8VWPqzsU6yTvLx1c';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let negociosCache = [];

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.className = 'toast ' + type;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'), 3000);
}

function navegar(panelId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + panelId).classList.add('active');
  window.scrollTo(0,0);
}

// ==========================================
// AUTH
// ==========================================
async function doLogin(){
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error) return toast(error.message, 'err');
  document.getElementById('panel-auth').style.display = 'none';
  iniciarApp();
}

// ==========================================
// NEGOCIOS Y FILTROS
// ==========================================
async function cargarNegocios(){
  const { data } = await db.from('negocios').select('*').eq('activo', true);
  negociosCache = data || [];
  renderizarNegocios(negociosCache);
}

function renderizarNegocios(lista){
    const cont = document.getElementById('lista-negocios');
    if(!lista.length) { cont.innerHTML = "No hay negocios disponibles."; return; }
    cont.innerHTML = lista.map(n => `
        <div class="product-card" onclick="toast('Perfil del negocio en desarrollo','ok')">
            <div class="product-img" style="background-image:url('${n.imagen_url || ''}'); background-size:cover;">${!n.imagen_url ? n.nombre[0] : ''}</div>
            <div class="product-info">
                <div style="font-weight:800;">${n.nombre}</div>
                <div style="font-size:12px; color:var(--muted);">${n.categoria || 'Comercio'}</div>
                <div style="color:var(--green); font-size:11px; font-weight:700; margin-top:4px;">● Abierto ahora</div>
            </div>
        </div>
    `).join('');
}

function aplicarFiltros(){
    const q = document.getElementById('buscar').value.toLowerCase();
    const filtrados = negociosCache.filter(n => n.nombre.toLowerCase().includes(q));
    renderizarNegocios(filtrados);
}

// ==========================================
// PERFIL Y DATOS
// ==========================================
async function guardarPerfilUsuario() {
  const btn = document.getElementById('btn-save-perfil');
  const nombre = document.getElementById('edit-user-nombre').value.trim();
  const edad = document.getElementById('edit-user-edad').value.trim();
  const whatsapp = document.getElementById('edit-user-wa').value.trim();
  const fotoFile = document.getElementById('edit-user-foto').files[0];

  if(!nombre || !edad || !whatsapp) return toast('Completa los campos obligatorios', 'err');
  
  btn.disabled = true; toast('Guardando...', 'ok');
  let avatarUrl = currentProfile?.avatar_url;

  if (fotoFile) {
    const fileName = `${currentUser.id}_${Date.now()}`;
    const { error: uploadError } = await db.storage.from('avatars').upload(fileName, fotoFile);
    if (!uploadError) {
      const { data: urlData } = db.storage.from('avatars').getPublicUrl(fileName);
      avatarUrl = urlData.publicUrl;
    }
  }

  const { error } = await db.from('profiles').upsert({ 
    id: currentUser.id, nombre, edad, whatsapp, avatar_url: avatarUrl 
  });

  if(!error) {
    toast('¡Perfil actualizado!', 'ok');
    iniciarApp();
  }
  btn.disabled = false;
}

function renderizarPantallaCuenta() {
  const cont = document.getElementById('cuenta-contenido');
  const foto = currentProfile?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
  
  cont.innerHTML = `
    <div style="background:var(--green); color:#fff; padding:40px 20px; display:flex; align-items:center; gap:20px; border-radius:0 0 20px 20px;">
        <img src="${foto}" style="width:80px; height:80px; border-radius:50%; border:3px solid #fff; object-fit:cover;">
        <div>
            <h2 style="font-family:'Bricolage Grotesque';">${currentProfile?.nombre || 'Usuario'}</h2>
            <p style="font-size:14px; opacity:0.8;">${currentUser?.email}</p>
        </div>
    </div>
    <div style="padding:30px 20px; display:flex; flex-direction:column; gap:10px;">
        <button class="product-card" onclick="navegar('editar-perfil')">✏️ Editar mis datos</button>
        <button class="product-card" onclick="navegar('onb-1')">🏪 Registrar mi negocio</button>
        <button class="product-card" style="color:var(--danger);" onclick="db.auth.signOut(); location.reload();">🚪 Cerrar Sesión</button>
    </div>
  `;
}

// ==========================================
// ARRANQUE
// ==========================================
async function iniciarApp() {
  const { data: { session } } = await db.auth.getSession();
  currentUser = session?.user || null;
  
  if (!currentUser) { 
    document.getElementById('panel-auth').style.display = 'flex'; 
  } else {
    const { data: prof } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = prof;
    
    // Actualizar avatares
    const foto = prof?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
    document.getElementById('nav-avatar').src = foto;
    document.getElementById('pc-user-info').innerHTML = `
        <img src="${foto}" class="profile-pic">
        <div style="font-size:13px; font-weight:700;">${prof?.nombre || 'Usuario'}</div>
    `;

    renderizarPantallaCuenta();
    await cargarNegocios();
    navegar('inicio');
  }
}

window.onload = iniciarApp;
</script>
</body>
</html>
