<!DOCTYPE html>
<html lang="es">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mercado Guerrero · App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f7a3f; --green-deep:#0a5a2e; --green-soft:#e8f5ec;
    --orange:#ea580c; --orange-soft:#fff4ec; --orange-deep:#c2410c;
    --ink:#101418; --muted:#6b7280; --line:#e5e7eb;
    --bg:#f3efe7; --bg-warm:#ebe4d6; --card:#ffffff; --star:#f59e0b;
    --danger:#dc2626;
    --radius:14px;
    --sh: 0 10px 25px -12px rgba(0,0,0,.15), 0 4px 8px -4px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  html,body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;height:100%;}
  
  body{
    background-image:
      radial-gradient(circle at 10% 0%, rgba(15,122,63,.06), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(234,88,12,.06), transparent 40%);
    display: flex; justify-content: center; align-items: flex-start;
  }

  .app-layout { 
    width: 100%; max-width: 440px; background: #fff; 
    height: 100vh; display: flex; flex-direction: column; 
    position: relative; overflow: hidden;
  }
  @media (min-width: 441px) {
    .app-layout {
      height: 90vh; margin-top: 5vh; border-radius: 42px;
      box-shadow: 0 30px 60px -15px rgba(0,0,0,.3);
      border: 8px solid #111;
    }
  }

  /* Ajuste para que los paneles no tapen el footer */
  .panel { display: none; flex: 1; flex-direction: column; overflow-y: auto; background: #fff; position: relative; padding-bottom: 60px; }
  .panel.active { display: flex; }
  .panel::-webkit-scrollbar { width: 0; }

  /* FOOTER FIJO */
  .app-footer {
    position: absolute; bottom: 0; width: 100%; height: 50px;
    background: #fff; border-top: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center; gap: 8px;
    z-index: 100; font-size: 11px; font-weight: 700; color: var(--muted);
  }

  /* HEADER & BUSCADOR */
  .app-header { background: var(--green); color: #fff; padding: 14px 16px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
  .app-header.orange { background: var(--orange); }
  .app-header .logo { font-family: 'Bricolage Grotesque', serif; font-weight: 800; font-size: 20px; letter-spacing: -.02em; display:flex; align-items:center; gap:8px;}
  .app-header .logo em { font-style: italic; color: #ffd9a8; }
  .app-header-title { font-weight: 700; font-size: 17px; flex: 1; text-align: center; }
  .back-btn { cursor: pointer; font-size: 20px; line-height: 1; opacity: .9; padding: 0 10px 0 0; }
  .app-body { flex: 1; padding: 14px; background: #fff; }
  
  .product-card { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; position:relative;}
  .product-img { width: 74px; height: 74px; border-radius: 10px; background: #ddd; flex-shrink: 0; background-size: cover; background-position: center; display:grid; place-items:center; font-weight:800; font-size:24px; color:var(--muted); }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 700; font-size: 14px; line-height: 1.2; margin-bottom: 3px; }
  .product-biz { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; margin-top:2px; }
  
  .field { margin-bottom: 12px; text-align:left;}
  .field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; display: block; }
  .field input, .field select, .field textarea { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-family: inherit; font-size: 14px; background: #fff; outline:none;}
  
  .btn-save { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 12px; padding: 14px; font-weight: 800; font-size: 15px; font-family: inherit; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 6px;}
  .btn-orange { background: var(--orange); }

  /* ESTILO PARA FOTO CIRCULAR */
  .profile-pic { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; background: #eee; }

  .toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 999px; z-index: 10000; font-size: 13px; font-weight: 600; box-shadow: var(--sh); transition: 0.3s; white-space: nowrap; }
  .toast.hidden { top: -60px; opacity: 0; }
</style>
</head>
<body>

<div class="app-layout">
  <div id="toast" class="toast hidden"></div>

  <div class="app-footer">
    <svg width="18" height="18" viewBox="0 -22 100 122">
      <path d="M 32 2 Q 32 -18 50 -18 Q 68 -18 68 2" fill="none" stroke="#0f7a3f" stroke-width="7" stroke-linecap="round"/>
      <rect x="0" y="0" width="100" height="100" rx="22" fill="#0f7a3f"/>
      <path d="M70 0 L100 0 L100 30 L88 30 A18 18 0 0 0 70 12 Z" fill="#ea580c"/>
    </svg>
    <span>Mercado Guerrero · El corazón de tu comunidad</span>
  </div>

  <div id="panel-auth" class="panel active">
    <div class="app-body" style="display:flex; flex-direction:column; justify-content:center; padding:30px 24px; text-align:center;">
       <h2 style="font-family:'Bricolage Grotesque';">Bienvenido</h2>
       <div id="auth-form-login">
          <div class="field"><label>Email</label><input type="email" id="login-email"></div>
          <div class="field"><label>Pass</label><input type="password" id="login-pass"></div>
          <button class="btn-save" onclick="doLogin()">Entrar</button>
       </div>
    </div>
  </div>

  <div id="panel-inicio" class="panel">
    <div class="app-header">
      <div class="logo">MG <em>Guerrero</em></div>
      <div style="margin-left:auto" onclick="navegar('cuenta')">👤</div>
    </div>
    <div class="app-body">
      <h3>Explora Negocios</h3>
      <div id="lista-negocios">Cargando...</div>
    </div>
  </div>

  <div id="panel-cuenta" class="panel">
    <div class="app-header">
      <div class="back-btn" onclick="navegar('inicio')">‹</div>
      <div class="app-header-title">Mi Perfil</div>
    </div>
    <div class="app-body" id="cuenta-contenido" style="padding:0;">
      </div>
  </div>

  <div id="panel-editar-perfil" class="panel">
    <div class="app-header"><div class="back-btn" onclick="navegar('cuenta')">‹</div><div class="app-header-title">Editar Datos</div></div>
    <div class="app-body">
      <div class="field">
        <label>Foto de Perfil</label>
        <input type="file" id="edit-user-foto" accept="image/*">
      </div>
      <div class="field"><label>Nombre Completo</label><input type="text" id="edit-user-nombre"></div>
      <div class="field"><label>Dirección</label><input type="text" id="edit-user-dir"></div>
      <div class="field"><label>WhatsApp</label><input type="number" id="edit-user-wa"></div>
      <button class="btn-save" id="btn-save-perfil" onclick="guardarPerfilUsuario()">Guardar Cambios</button>
    </div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://djddsqbmaxgpryabvktt.supabase.co';
const SUPABASE_KEY = 'TU_KEY_AQUI'; // Asegúrate de que esta sea tu clave real
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.className = 'toast ' + type;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'), 3000);
}

function navegar(panelId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + panelId).classList.add('active');
}

// ==========================================
// AUTH
// ==========================================
async function doLogin(){
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error) return toast(error.message, 'err');
  iniciarApp();
}

// ==========================================
// LOGICA DE CUENTA
// ==========================================
function renderizarPantallaCuenta() {
  const cont = document.getElementById('cuenta-contenido');
  // Usar foto guardada o un icono por defecto
  const fotoSrc = currentProfile?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';

  cont.innerHTML = `
    <div style="background:linear-gradient(135deg,var(--green),var(--green-deep)); color:#fff; padding:30px 20px; display:flex; align-items:center; gap:14px;">
      <img src="${fotoSrc}" class="profile-pic" id="mi-foto-perfil">
      <div>
        <h3 style="font-family:'Bricolage Grotesque'; font-size:20px;">Hola, ${currentProfile?.nombre || 'Usuario'}</h3>
        <small style="opacity:.85;">Miembro de Mercado Guerrero</small>
      </div>
    </div>
    <div style="padding:20px;">
      <button class="btn-save btn-outline" style="background:#f3f4f6; color:#111;" onclick="abrirEditarPerfil()">✏️ Editar mis datos</button>
      <button class="btn-save" style="margin-top:10px; background:var(--danger);" onclick="db.auth.signOut(); location.reload();">Cerrar Sesión</button>
    </div>
  `;
}

function abrirEditarPerfil() {
  document.getElementById('edit-user-nombre').value = currentProfile?.nombre || '';
  document.getElementById('edit-user-dir').value = currentProfile?.direccion || '';
  document.getElementById('edit-user-wa').value = currentProfile?.whatsapp || '';
  navegar('editar-perfil');
}

async function guardarPerfilUsuario() {
  const btn = document.getElementById('btn-save-perfil');
  const nombre = document.getElementById('edit-user-nombre').value.trim();
  const direccion = document.getElementById('edit-user-dir').value.trim();
  const whatsapp = document.getElementById('edit-user-wa').value.trim();
  const fotoFile = document.getElementById('edit-user-foto').files[0];

  if(!nombre) return toast('El nombre es obligatorio', 'err');
  
  btn.disabled = true;
  btn.textContent = 'Guardando...';
  toast('Actualizando perfil...', 'ok');

  let avatarUrl = currentProfile?.avatar_url;

  // 1. SI HAY FOTO NUEVA, SUBIRLA AL STORAGE
  if (fotoFile) {
    const fileExt = fotoFile.name.split('.').pop();
    const fileName = `${currentUser.id}_${Math.random()}.${fileExt}`;
    const filePath = `${fileName}`;

    const { error: uploadError } = await db.storage
      .from('avatars')
      .upload(filePath, fotoFile);

    if (uploadError) {
      toast('Error subiendo foto', 'err');
    } else {
      const { data: publicUrlData } = db.storage.from('avatars').getPublicUrl(filePath);
      avatarUrl = publicUrlData.publicUrl;
    }
  }

  // 2. ACTUALIZAR TABLA PROFILES
  const { error } = await db.from('profiles').update({ 
    nombre: nombre, 
    direccion: direccion, 
    whatsapp: whatsapp,
    avatar_url: avatarUrl 
  }).eq('id', currentUser.id);

  if(error) {
    toast(error.message, 'err');
  } else {
    // ACTUALIZAR VARIABLE LOCAL PARA QUE EL CAMBIO SE VEA DE INMEDIATO
    currentProfile.nombre = nombre;
    currentProfile.direccion = direccion;
    currentProfile.whatsapp = whatsapp;
    currentProfile.avatar_url = avatarUrl;

    toast('¡Datos actualizados!', 'ok');
    renderizarPantallaCuenta(); // Re-dibujar la pantalla de cuenta
    navegar('cuenta'); // Regresar a la pantalla de cuenta
  }
  
  btn.disabled = false;
  btn.textContent = 'Guardar Cambios';
}

// ==========================================
// ARRANQUE
// ==========================================
async function iniciarApp() {
  const { data: { session } } = await db.auth.getSession();
  currentUser = session?.user || null;
  
  if (!currentUser) { 
    navegar('auth'); 
  } else {
    const { data: prof } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = prof;
    renderizarPantallaCuenta();
    navegar('inicio');
  }
}

window.onload = iniciarApp;
</script>
</body>
</html>
