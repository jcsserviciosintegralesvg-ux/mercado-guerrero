<!DOCTYPE html>
<html lang="es">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mercado Guerrero · App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f7a3f; --green-deep:#0a5a2e; --green-soft:#e8f5ec;
    --orange:#ea580c; --orange-soft:#fff4ec; --orange-deep:#c2410c;
    --ink:#101418; --muted:#6b7280; --line:#e5e7eb;
    --bg:#f4f6f8; --card:#ffffff; --star:#f59e0b;
    --danger:#dc2626;
    --radius:16px;
    --sh: 0 4px 12px rgba(0,0,0,0.05);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
  html,body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;height:100%; overflow:hidden;}
  
  /* CONTENEDOR PRINCIPAL */
  .app-layout { 
    width: 100%; height: 100vh; display: flex; flex-direction: column; 
    position: relative; background: var(--bg);
  }

  /* VISTA ESCRITORIO (PC/LAPTOP) */
  @media (min-width: 769px) {
    .app-layout { flex-direction: row; }
    
    /* Sidebar Fijo a la izquierda con color de marca */
    #sidebar-desktop {
        display: flex !important; width: 280px; background: #fff;
        border-right: 1px solid var(--line); flex-direction: column; 
        z-index: 100; box-shadow: 2px 0 15px rgba(0,0,0,0.03);
    }

    /* Cabecera verde dentro del sidebar */
    .sidebar-header {
        background: var(--green); padding: 24px 20px; color: #fff;
        border-bottom: 4px solid var(--green-deep);
    }

    .sidebar-menu { padding: 20px; display: flex; flex-direction: column; gap: 8px; flex: 1; }

    /* Contenido a la derecha */
    .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    
    .panel { 
        max-width: 1100px; margin: 0 auto; width: 100%; 
        padding: 40px 30px !important; background: transparent !important;
    }

    /* Cuadrículas para los negocios y productos */
    #lista-negocios, #lista-promos, #pub-productos, #biz-productos-lista {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }

    .app-header { display: none !important; } /* Ocultar cabecera móvil en PC */
  }

  /* VISTA MÓVIL (Por defecto) */
  #sidebar-desktop { display: none; }
  .main-content { flex: 1; overflow-y: auto; height: 100%; display: flex; flex-direction: column;}
  .panel { display: none; padding: 0 0 40px; background: var(--bg); flex: 1; }
  .panel.active { display: flex; flex-direction: column; }

  /* HEADER MÓVIL */
  .app-header { 
    background: var(--green); color: #fff; padding: 16px; 
    display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; 
  }
  .app-header.orange { background: var(--orange); }

  /* TARJETAS MODERNAS */
  .product-card, .promo-card {
    background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px; display: flex; align-items: center; gap: 15px; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s; box-shadow: var(--sh); margin-bottom: 12px;
  }
  @media (min-width: 769px) { .product-card { margin-bottom: 0; height: 100%; } }
  .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); }

  .product-img { 
    width: 70px; height: 70px; border-radius: 12px; background: #eee; 
    flex-shrink: 0; object-fit: cover; display:grid; place-items:center; font-weight:800; font-size:24px; color:var(--muted);
  }

  /* FOOTER Acomodado */
  .app-footer {
    margin-top: auto; padding: 20px; background: rgba(255,255,255,0.8);
    border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: center; gap: 10px;
    font-size: 12px; font-weight: 600; color: var(--muted); width: 100%; flex-shrink: 0;
  }

  /* BOTONES Y FORMS */
  .btn-save { 
    width: 100%; background: var(--green); color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-save:hover { filter: brightness(1.1); }
  .btn-outline { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn-outline:hover { background: #f9fafb; }
  
  .field { margin-bottom: 16px; text-align: left; }
  .field label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
  .field input, .field select { width: 100%; border: 1px solid var(--line); border-radius: 10px; padding: 12px; font-size: 14px; outline: none; background:#fff;}
  .field input:focus { border-color: var(--green); }

  .profile-pic { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--ink); color:#fff; padding:12px 24px; border-radius:50px; z-index:9999; font-weight:600; transition: 0.3s; box-shadow: 0 10px 25px rgba(0,0,0,0.2);}
  .toast.hidden { top: -100px; opacity: 0; }
</style>
</head>
<body>

<div class="app-layout">
  <div id="toast" class="toast hidden"></div>

  <aside id="sidebar-desktop">
    <div class="sidebar-header">
        <div class="logo" style="font-family:'Bricolage Grotesque'; font-size:20px; font-weight:800; display:flex; align-items:center; gap:8px;">
          <svg width="28" height="28" viewBox="0 -22 100 122"><path d="M 32 2 Q 32 -18 50 -18 Q 68 -18 68 2" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/><rect x="0" y="0" width="100" height="100" rx="22" fill="#fff"/><path d="M70 0 L100 0 L100 30 L88 30 A18 18 0 0 0 70 12 Z" fill="#ea580c"/><text x="50" y="66" text-anchor="middle" font-family="Unbounded" font-size="38" font-weight="900" fill="#0f7a3f" letter-spacing="-1">MG</text></svg>
          Mercado <em>Guerrero</em>
        </div>
    </div>
    <div class="sidebar-menu">
        <button class="btn-save btn-outline" style="justify-content:flex-start;" onclick="navegar('inicio')">🏠 Inicio</button>
        <button class="btn-save btn-outline" style="justify-content:flex-start;" onclick="navegar('promos')">🔥 Promociones</button>
        <button class="btn-save btn-outline" style="justify-content:flex-start;" onclick="navegar('cuenta')">👤 Mi Cuenta</button>
        <div id="btn-negocio-pc"></div>
    </div>
    <div style="margin-top:auto; padding:20px; border-top:1px solid var(--line); display:flex; align-items:center; gap:10px;" id="pc-user-info">
        </div>
  </aside>

  <main class="main-content">
    
    <header class="app-header" id="mobile-header">
      <div onclick="toast('Menú en desarrollo', 'ok')" style="font-size:24px; cursor:pointer;">☰</div>
      <div class="logo" style="font-family:'Bricolage Grotesque'; font-size:18px; font-weight:800; display:flex; align-items:center; gap:8px;">
          <svg width="22" height="22" viewBox="0 -22 100 122"><path d="M 32 2 Q 32 -18 50 -18 Q 68 -18 68 2" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/><rect x="0" y="0" width="100" height="100" rx="22" fill="#fff"/><path d="M70 0 L100 0 L100 30 L88 30 A18 18 0 0 0 70 12 Z" fill="#ea580c"/><text x="50" y="66" text-anchor="middle" font-family="Unbounded" font-size="38" font-weight="900" fill="#0f7a3f" letter-spacing="-1">MG</text></svg>
          Mercado Guerrero
      </div>
      <div style="margin-left:auto;" onclick="navegar('cuenta')">
        <img id="nav-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-pic" style="width:32px; height:32px; border: 2px solid #fff;">
      </div>
    </header>

    <div style="flex: 1; display:flex; flex-direction:column;">
      
      <section id="panel-inicio" class="panel active">
          <div class="app-body" style="background:transparent;">
              <h2 style="font-family:'Bricolage Grotesque'; margin-bottom:15px; font-size:22px;">Explora el comercio local</h2>
              <div class="search-box" style="background:#fff; border: 1px solid var(--line); padding:14px; border-radius:12px; margin-bottom:24px; box-shadow: var(--sh);">
                  <input type="text" id="buscar" autocomplete="off" placeholder="🔍 ¿Qué estás buscando hoy?" oninput="aplicarFiltros()" style="background:transparent; border:none; width:100%; outline:none; font-size:15px;">
              </div>
              <div id="lista-negocios">Cargando negocios...</div>
          </div>
      </section>

      <section id="panel-promos" class="panel">
          <div class="app-body" style="background:transparent;">
              <h2 style="font-family:'Bricolage Grotesque'; margin-bottom:15px; font-size:22px;">🔥 Ofertas Imperdibles</h2>
              <div id="lista-promos"></div>
          </div>
      </section>

      <section id="panel-cuenta" class="panel">
          <div class="app-body" id="cuenta-contenido" style="background:transparent; max-width: 600px; margin: 0 auto; width: 100%;"></div>
      </section>

      <section id="panel-editar-perfil" class="panel">
          <div class="app-body" style="max-width:500px; margin: 0 auto; background:#fff; border-radius:var(--radius); box-shadow:var(--sh); padding: 30px;">
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <div style="font-size:24px; cursor:pointer;" onclick="navegar('cuenta')">‹</div>
                <h2 style="font-family:'Bricolage Grotesque'; margin:0;">Editar mi información</h2>
              </div>
              <div class="field"><label>Foto de Perfil</label><input type="file" id="edit-user-foto" accept="image/*"></div>
              <div class="field"><label>Nombre Completo *</label><input type="text" id="edit-user-nombre"></div>
              <div class="field"><label>Edad *</label><input type="number" id="edit-user-edad"></div>
              <div class="field"><label>WhatsApp *</label><input type="number" id="edit-user-wa"></div>
              <div class="field"><label>Dirección</label><input type="text" id="edit-user-dir"></div>
              <button class="btn-save" id="btn-save-perfil" onclick="guardarPerfilUsuario()">Guardar Cambios</button>
          </div>
      </section>

      <section id="panel-onb-1" class="panel">
          <div class="app-body" style="max-width:500px; margin: 0 auto; background:#fff; border-radius:var(--radius); box-shadow:var(--sh); padding: 30px;">
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:20px;">
                <div style="font-size:24px; cursor:pointer;" onclick="navegar('cuenta')">‹</div>
                <h2 style="font-family:'Bricolage Grotesque'; margin:0;">Registra tu negocio</h2>
              </div>
              <div class="field"><label>Nombre del negocio</label><input type="text" id="onb-nombre"></div>
              <div class="field"><label>Categoría</label><select id="onb-categoria"><option value="Comida">Comida</option><option value="Ferretería">Ferretería</option><option value="Servicios">Servicios</option><option value="Abarrotes">Abarrotes</option></select></div>
              <div class="field"><label>WhatsApp del negocio</label><input type="number" id="onb-wa"></div>
              <div class="field"><label>Dirección física</label><input type="text" id="onb-dir"></div>
              <button class="btn-save" onclick="guardarNegocioRapido()">Dar de alta negocio</button>
          </div>
      </section>
    </div>

    <footer class="app-footer">
        <svg width="20" height="20" viewBox="0 -22 100 122"><rect x="0" y="0" width="100" height="100" rx="22" fill="#0f7a3f"/><path d="M70 0 L100 0 L100 30 L88 30 A18 18 0 0 0 70 12 Z" fill="#ea580c"/></svg>
        <span>Mercado Guerrero · El corazón de tu comunidad</span>
    </footer>
  </main>

  <div id="panel-auth" style="position:fixed; inset:0; z-index:10000; background:var(--bg); display:none; align-items:center; justify-content:center;">
    <div style="max-width:380px; width:100%; padding:30px; background:#fff; border-radius:var(--radius); box-shadow:var(--sh); text-align:center;">
        <div style="display:flex; justify-content:center; margin-bottom:20px;">
          <svg width="60" height="60" viewBox="0 -22 100 122"><path d="M 32 2 Q 32 -18 50 -18 Q 68 -18 68 2" fill="none" stroke="#0f7a3f" stroke-width="7" stroke-linecap="round"/><rect x="0" y="0" width="100" height="100" rx="22" fill="#0f7a3f"/><path d="M70 0 L100 0 L100 30 L88 30 A18 18 0 0 0 70 12 Z" fill="#ea580c"/><text x="50" y="66" text-anchor="middle" font-family="Unbounded" font-size="38" font-weight="900" fill="#fff" letter-spacing="-1">MG</text></svg>
        </div>
        <h2 style="font-family:'Bricolage Grotesque'; margin-bottom:20px;">Inicia Sesión</h2>
        <div class="field"><label>Email</label><input type="email" id="login-email"></div>
        <div class="field"><label>Contraseña</label><input type="password" id="login-pass"></div>
        <button class="btn-save" onclick="doLogin()">Entrar</button>
    </div>
  </div>

</div>

<script>
// LLAVES DE SUPABASE CORRECTAS
const SUPABASE_URL = 'https://djddsqbmaxgpryabvktt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRqZGRzcWJtYXhncHJ5YWJ2a3R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzUxMTEsImV4cCI6MjA5MjIxMTExMX0.3JO1RU1_NY4cTCO23_QanF0kFBE8VWPqzsU6yTvLx1c';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let negociosCache = [];

function toast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent = msg; 
  t.className = 'toast ' + type;
  t.classList.remove('hidden');
  setTimeout(()=>t.classList.add('hidden'), 3000);
}

function navegar(panelId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + panelId).classList.add('active');
  document.querySelector('.main-content').scrollTo(0,0);
}

// ==========================================
// CERRAR SESIÓN ARREGLADO
// ==========================================
async function doLogout(){
  toast('Cerrando sesión...', 'ok');
  await db.auth.signOut();
  currentUser = null;
  currentProfile = null;
  location.reload(); // Recarga limpia la app
}

// ==========================================
// AUTH Y LOGIN
// ==========================================
async function doLogin(){
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  if(!email || !password) return toast('Llena los datos', 'err');
  toast('Verificando...', 'ok');
  
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error) return toast(error.message, 'err');
  
  document.getElementById('panel-auth').style.display = 'none';
  toast('¡Bienvenido!', 'ok');
  iniciarApp();
}

// ==========================================
// NEGOCIOS Y FILTROS
// ==========================================
async function cargarNegocios(){
  const { data, error } = await db.from('negocios').select('*').eq('activo', true);
  negociosCache = data || [];
  renderizarNegocios(negociosCache);
}

function renderizarNegocios(lista){
    const cont = document.getElementById('lista-negocios');
    if(!lista.length) { cont.innerHTML = "<p style='color:var(--muted);'>No hay negocios disponibles.</p>"; return; }
    cont.innerHTML = lista.map(n => `
        <div class="product-card" onclick="toast('Perfil del negocio en desarrollo','ok')">
            <div class="product-img" style="background-image:url('${n.imagen_url || ''}'); background-size:cover;">${!n.imagen_url ? n.nombre[0] : ''}</div>
            <div class="product-info">
                <div style="font-weight:800; font-size:16px;">${n.nombre}</div>
                <div style="font-size:13px; color:var(--muted); margin-top:2px;">${n.categoria || 'Comercio'}</div>
                <div style="color:var(--green); font-size:11px; font-weight:700; margin-top:6px;">● Abierto ahora</div>
            </div>
        </div>
    `).join('');
}

function aplicarFiltros(){
    const q = document.getElementById('buscar').value.toLowerCase();
    const filtrados = negociosCache.filter(n => n.nombre.toLowerCase().includes(q));
    renderizarNegocios(filtrados);
}

// ==========================================
// PERFIL Y DATOS
// ==========================================
async function guardarPerfilUsuario() {
  const btn = document.getElementById('btn-save-perfil');
  const nombre = document.getElementById('edit-user-nombre').value.trim();
  const edad = document.getElementById('edit-user-edad').value.trim();
  const whatsapp = document.getElementById('edit-user-wa').value.trim();
  const dir = document.getElementById('edit-user-dir').value.trim();
  const fotoFile = document.getElementById('edit-user-foto').files[0];

  if(!nombre || !edad || !whatsapp) return toast('Nombre, Edad y WhatsApp son obligatorios', 'err');
  
  btn.disabled = true; btn.textContent = "Guardando..."; toast('Guardando...', 'ok');
  let avatarUrl = currentProfile?.avatar_url;

  if (fotoFile) {
    const fileName = `${currentUser.id}_${Date.now()}`;
    const { error: uploadError } = await db.storage.from('avatars').upload(fileName, fotoFile);
    if (!uploadError) {
      const { data: urlData } = db.storage.from('avatars').getPublicUrl(fileName);
      avatarUrl = urlData.publicUrl;
    }
  }

  const { error } = await db.from('profiles').upsert({ 
    id: currentUser.id, nombre, edad, whatsapp, direccion: dir, avatar_url: avatarUrl 
  });

  if(!error) {
    toast('¡Perfil actualizado!', 'ok');
    iniciarApp(); // Refresca los datos en la pantalla
  } else {
    toast('Error: ' + error.message, 'err');
  }
  btn.disabled = false; btn.textContent = "Guardar Cambios";
}

function renderizarPantallaCuenta() {
  const cont = document.getElementById('cuenta-contenido');
  const foto = currentProfile?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
  
  cont.innerHTML = `
    <div style="background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:40px 20px; display:flex; flex-direction:column; align-items:center; text-align:center; box-shadow:var(--sh); margin-bottom:20px;">
        <img src="${foto}" style="width:100px; height:100px; border-radius:50%; border:4px solid var(--green-soft); object-fit:cover; margin-bottom:15px;">
        <h2 style="font-family:'Bricolage Grotesque'; font-size:24px;">${currentProfile?.nombre || 'Usuario'}</h2>
        <p style="font-size:14px; color:var(--muted);">${currentUser?.email}</p>
        <div style="background:var(--green-soft); color:var(--green-deep); padding:5px 12px; border-radius:50px; font-size:12px; font-weight:700; margin-top:10px;">${currentProfile?.rol === 'negocio' ? 'Cuenta de Negocio' : 'Cuenta de Cliente'}</div>
    </div>
    
    <div style="display:flex; flex-direction:column; gap:12px;">
        <button class="product-card" style="width:100%; justify-content:flex-start;" onclick="navegar('editar-perfil')">
           <span style="font-size:20px;">✏️</span> <span style="font-weight:700;">Editar mis datos</span>
        </button>
        <button class="product-card" style="width:100%; justify-content:flex-start;" onclick="navegar('onb-1')">
           <span style="font-size:20px;">🏪</span> <span style="font-weight:700;">Registrar mi negocio</span>
        </button>
        <button class="product-card" style="width:100%; justify-content:flex-start; color:var(--danger);" onclick="doLogout()">
           <span style="font-size:20px;">🚪</span> <span style="font-weight:700;">Cerrar Sesión</span>
        </button>
    </div>
  `;
}

// ==========================================
// REGISTRO RÁPIDO DE NEGOCIO
// ==========================================
async function guardarNegocioRapido() {
  const nombre = document.getElementById('onb-nombre').value.trim();
  const cat = document.getElementById('onb-categoria').value;
  const wa = document.getElementById('onb-wa').value.trim();
  const dir = document.getElementById('onb-dir').value.trim();
  
  if(!nombre || !wa || !dir) return toast('Llena nombre, WhatsApp y dirección', 'err');
  
  toast('Registrando...', 'ok');
  const { error } = await db.from('negocios').upsert({ 
    user_id: currentUser.id, nombre, categoria: cat, whatsapp: wa, direccion: dir, activo: true 
  }, { onConflict: 'user_id' });

  if(error) {
    toast('Error: ' + error.message, 'err');
  } else {
    await db.from('profiles').update({ rol: 'negocio' }).eq('id', currentUser.id);
    toast('¡Negocio registrado!', 'ok');
    navegar('inicio');
  }
}

// ==========================================
// ARRANQUE
// ==========================================
async function iniciarApp() {
  const { data: { session } } = await db.auth.getSession();
  currentUser = session?.user || null;
  
  if (!currentUser) { 
    document.getElementById('panel-auth').style.display = 'flex'; 
  } else {
    document.getElementById('panel-auth').style.display = 'none'; 
    const { data: prof } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = prof;
    
    // Actualizar avatares e info en la vista
    const foto = prof?.avatar_url || 'https://cdn-icons-png.flaticon.com/512/149/149071.png';
    document.getElementById('nav-avatar').src = foto;
    document.getElementById('pc-user-info').innerHTML = `
        <img src="${foto}" class="profile-pic">
        <div style="font-size:13px; font-weight:700; display:flex; flex-direction:column;">
            <span>${prof?.nombre || 'Usuario'}</span>
            <span style="font-size:11px; color:var(--muted); font-weight:500;">Conectado</span>
        </div>
    `;

    renderizarPantallaCuenta();
    await cargarNegocios();
    navegar('inicio');
  }
}

window.onload = iniciarApp;
</script>
</body>
</html>
